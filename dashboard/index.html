<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starship OS — Agent Dashboard</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #1f2d50;
    --primary: #4fc3f7;
    --success: #81c784;
    --warn: #ffb74d;
    --error: #e57373;
    --text: #e0e0e0;
    --text-dim: #8899aa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Ubuntu', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--surface2);
  }
  .header h1 { font-size: 22px; color: var(--primary); }
  .header .status-badge { font-size: 13px; padding: 4px 12px; border-radius: 12px; }
  .badge-ok { background: #1b5e20; color: var(--success); }
  .badge-warn { background: #e65100; color: var(--warn); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--surface);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--surface2);
  }
  .card h2 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

  .agent-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
    cursor: pointer;
  }
  .agent-row:last-child { border-bottom: none; }
  .agent-name { font-weight: 500; }
  .agent-status { font-size: 12px; padding: 2px 8px; border-radius: 8px; }
  .status-online { background: #1b5e20; color: var(--success); }
  .status-processing { background: #e65100; color: var(--warn); }
  .status-offline { background: #b71c1c; color: var(--error); }

  .telemetry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .metric { text-align: center; padding: 8px; background: var(--surface2); border-radius: 8px; }
  .metric .value { font-size: 22px; font-weight: 700; color: var(--primary); }
  .metric .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .chat-box {
    display: flex;
    flex-direction: column;
    height: 400px;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .msg { margin-bottom: 6px; padding: 4px 8px; border-radius: 6px; }
  .msg .sender { font-weight: 600; color: var(--primary); }
  .msg .time { font-size: 10px; color: var(--text-dim); margin-left: 8px; }
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  .chat-input-row select, .chat-input-row input {
    background: var(--surface2);
    border: 1px solid #334;
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
  }
  .chat-input-row input { flex: 1; }
  .chat-input-row button {
    background: var(--primary);
    color: #111;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }
  .chat-input-row button:hover { background: #81d4fa; }

  .log-viewer {
    height: 200px;
    overflow-y: auto;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px;
    font-family: monospace;
    font-size: 11px;
    white-space: pre-wrap;
  }
  .log-line { color: var(--text-dim); }
  .log-line.error { color: var(--error); }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>⭐ Starship OS</h1>
  <span id="healthBadge" class="status-badge badge-ok">● All systems nominal</span>
</div>

<div class="grid">
  <div class="card">
    <h2>🤖 Agents</h2>
    <div id="agentList"></div>
  </div>

  <div class="card">
    <h2>📊 Telemetry</h2>
    <div class="telemetry-grid" id="telemetryGrid">
      <div class="metric"><div class="value" id="cpuVal">--</div><div class="label">CPU %</div></div>
      <div class="metric"><div class="value" id="memVal">--</div><div class="label">RAM</div></div>
      <div class="metric"><div class="value" id="diskVal">--</div><div class="label">DISK</div></div>
      <div class="metric"><div class="value" id="netVal">--</div><div class="label">NET</div></div>
    </div>
  </div>
</div>

<div class="grid">
  <div class="card" style="grid-column: span 2;">
    <h2>💬 Agent Chat</h2>
    <div class="chat-box">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <select id="chatAgent">
          <option value="proxy">Proxy</option>
          <option value="romi">Romi</option>
          <option value="ergo">Ergo</option>
        </select>
        <input type="text" id="chatInput" placeholder="Type a command..." />
        <button onclick="sendCommand()">Send</button>
      </div>
    </div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>📋 Agent Logs</h2>
    <div style="margin-bottom: 8px;">
      <select id="logAgent" style="background:var(--surface2);border:1px solid #334;color:var(--text);padding:4px 8px;border-radius:4px;">
        <option value="proxy">Proxy</option>
        <option value="romi">Romi</option>
        <option value="ergo">Ergo</option>
      </select>
      <button onclick="loadLogs()" style="background:var(--surface2);border:1px solid #334;color:var(--text);padding:4px 12px;border-radius:4px;cursor:pointer;">Refresh</button>
    </div>
    <div class="log-viewer" id="logViewer">Select an agent and click Refresh</div>
  </div>
</div>

<script>
const STATUS_URL = '/api/status';

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

function renderAgents(data) {
  const el = document.getElementById('agentList');
  if (!data || !data.agents) { el.innerHTML = '<div style="color:var(--text-dim)">No data</div>'; return; }
  el.innerHTML = '';
  for (const [name, agent] of Object.entries(data.agents)) {
    const status = agent.status || 'unknown';
    const row = document.createElement('div');
    row.className = 'agent-row';
    row.onclick = () => { document.getElementById('chatAgent').value = name; };
    row.innerHTML = `
      <span class="agent-name">${name.charAt(0).toUpperCase() + name.slice(1)}</span>
      <span class="agent-status status-${status}">${status}</span>
    `;
    el.appendChild(row);
  }
  // Update online count
  const online = Object.values(data.agents).filter(a => a.status === 'online').length;
  const total = Object.keys(data.agents).length;
  const badge = document.getElementById('healthBadge');
  if (online === total) {
    badge.textContent = '● All systems nominal';
    badge.className = 'status-badge badge-ok';
  } else if (online > 0) {
    badge.textContent = `● ${online}/${total} agents online`;
    badge.className = 'status-badge badge-warn';
  } else {
    badge.textContent = '● All agents offline';
    badge.className = 'status-badge badge-ok';
    badge.style.color = 'var(--error)';
  }
}

function renderTelemetry(data) {
  if (!data || !data.telemetry || !data.telemetry.full) return;
  const t = data.telemetry.full;
  document.getElementById('cpuVal').textContent = (t.cpu || 0).toFixed(1) + '%';
  const mu = Math.round((t.memory_used || 0) / 1073741824);
  const mt = Math.round((t.memory_total || 0) / 1073741824);
  document.getElementById('memVal').textContent = mu + '/' + mt + 'GB';
  const du = Math.round((t.disk_used || 0) / 1073741824 / 1024);
  const dt = Math.round((t.disk_total || 0) / 1073741824 / 1024);
  document.getElementById('diskVal').textContent = du + '/' + dt + 'GB';

  // Update recent messages
  if (data.messages && data.messages.length > 0) {
    const chatEl = document.getElementById('chatMessages');
    const latest = data.messages[0];
    if (latest) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<span class="sender">${(latest.agent || '?').toUpperCase()}</span> ${latest.response || ''}`;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }
  }
}

async function refresh() {
  const data = await fetchJSON(STATUS_URL);
  renderAgents(data);
  renderTelemetry(data);
}

async function sendCommand() {
  const agent = document.getElementById('chatAgent').value;
  const input = document.getElementById('chatInput');
  const cmd = input.value.trim();
  if (!cmd) return;

  const chatEl = document.getElementById('chatMessages');
  chatEl.innerHTML += `<div class="msg"><span class="sender">YOU → ${agent.toUpperCase()}</span> ${cmd}</div>`;

  try {
    const r = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent, command: cmd, args: {} }),
    });
    const result = await r.json();
    const resp = result.response || result.error || 'No response';
    chatEl.innerHTML += `<div class="msg"><span class="sender">${agent.toUpperCase()}</span> ${resp}</div>`;
  } catch (e) {
    chatEl.innerHTML += `<div class="msg"><span class="sender" style="color:var(--error)">ERROR</span> ${e.message}</div>`;
  }

  chatEl.scrollTop = chatEl.scrollHeight;
  input.value = '';
}

async function loadLogs() {
  const agent = document.getElementById('logAgent').value;
  const viewer = document.getElementById('logViewer');
  try {
    const r = await fetch(`/api/logs?agent=${agent}`);
    const data = await r.json();
    viewer.innerHTML = data.lines.map(l => `<div class="log-line${l.toLowerCase().includes('error') ? ' error' : ''}">${l}</div>`).join('');
  } catch {
    viewer.innerHTML = '<div class="log-line error">Failed to load logs</div>';
  }
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendCommand();
});

refresh();
setInterval(refresh, 3000);
loadLogs();
setInterval(loadLogs, 15000);
</script>
</body>
</html>
