<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starship OS — Command Center</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="brand">
      <span class="mark"></span>
      STARSHIP OS
      <span class="live-tag">LIVE</span>
    </div>
    <div class="meta">
      <span id="system-status"><span class="status-dot yellow"></span> <span id="status-text">Connecting…</span></span>
      <span class="mono" id="clock">--:--:--</span>
    </div>
  </header>

  <aside id="sidebar">
    <div class="nav-label">Command</div>
    <div class="nav-item active" data-view="dashboard" data-live="1"><span class="ico">◈</span> Overview</div>
    <div class="nav-item" data-view="agents" data-live="1"><span class="ico">⬡</span> Crew Manifest</div>
    <div class="nav-item" data-view="fleet" data-live="1"><span class="ico">◎</span> Fleet Map</div>
    <div class="nav-item" data-view="chat" data-live="1"><span class="ico">✉</span> Officer Check-In</div>
    <div class="nav-item" data-view="connect" data-live="1"><span class="ico">🔗</span> Connect</div>
    <div class="nav-item" data-view="incidents" data-live="1"><span class="ico">⚠</span> Incidents</div>
    <div class="nav-label">Systems</div>
    <div class="nav-item" data-view="policy" data-live="1"><span class="ico">☰</span> Policy</div>
    <div class="nav-item" data-view="memory" data-live="1"><span class="ico">◉</span> Memory</div>
    <div class="nav-item" data-view="shield" data-live="1"><span class="ico">⛨</span> Shield</div>
    <div class="nav-item" data-view="skills" data-live="1"><span class="ico">✦</span> Skills</div>
    <div class="nav-item" data-view="telemetry" data-live="1"><span class="ico">⌁</span> Telemetry Log</div>
    <div class="nav-item offline" data-view="accounts" data-live="0"><span class="ico">⚙</span> Accounts</div>
    <div class="nav-item offline" data-view="email" data-live="0"><span class="ico">✉</span> Email</div>
    <div class="nav-item" data-view="orgchart" data-live="1"><span class="ico">⧉</span> Org Chart</div>
    <div class="nav-item offline" data-view="goals" data-live="0"><span class="ico">◎</span> Goals</div>
    <div id="agent-status-list"></div>
  </aside>

  <main id="main">
    <div id="dashboard-content" class="view active"></div>
    <div id="agents-content" class="view"></div>
    <div id="fleet-content" class="view"></div>
    <div id="chat-content" class="view"></div>
    <div id="incidents-content" class="view"></div>
    <div id="connect-content" class="view"></div>
    <div id="policy-content" class="view"></div>
    <div id="memory-content" class="view"></div>
    <div id="shield-content" class="view"></div>
    <div id="skills-content" class="view"></div>
    <div id="telemetry-content" class="view"></div>
    <div id="accounts-content" class="view"></div>
    <div id="email-content" class="view"></div>
    <div id="orgchart-content" class="view"></div>
    <div id="goals-content" class="view"></div>
  </main>

  <aside id="right-panel">
    <div class="panel-head">
      <span>Detail</span>
      <button class="btn btn-secondary" id="right-panel-close" style="padding:2px 8px;font-size:11px">Clear</button>
    </div>
    <div id="right-content">
      <div class="empty-state" style="padding:24px 8px">
        <p>Select a crew member or plant for detail.</p>
      </div>
    </div>
  </aside>
</div>

<div id="toast-container"></div>
<div id="modal-overlay">
  <div class="modal glass">
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="/ui.js"></script>
<script src="/dashboard.js"></script>
<script src="/agents.js"></script>
<script src="/fleet.js"></script>
<script src="/chat.js"></script>
<script src="/incidents.js"></script>
<script src="/panels.js"></script>
<script src="/shield.js"></script>
<script src="/connect.js"></script>
<script src="/telemetry.js"></script>
<script src="/policy.js"></script>
<script src="/skills.js"></script>
<script src="/memory.js"></script>
<script src="/orgchart.js"></script>
<script src="/boot.js"></script>
</body>
</html>
