# Starship OS — multi-node fleet NATS bus (ops profile)
# Installed to /etc/starship/nats/fleet-bus.conf
# Active when firstboot sets active.conf → fleet-bus.conf
#
# Token: firstboot writes STARSHIP_NATS_TOKEN into this file and /etc/starship/nats.env
# Dual-prefix: starship.* primary + agnetic.* legacy.

port: 4222
host: "0.0.0.0"
http_port: 8222

jetstream {
  store_dir: "/var/lib/starship/nats"
  max_memory_store: 512MB
  max_file_store: 4GB
}

max_payload: 8MB
max_connections: 256
debug: false
trace: false

# Shared fleet token — firstboot replaces __STARSHIP_NATS_TOKEN__
authorization {
  token: "__STARSHIP_NATS_TOKEN__"
  timeout: 5.0
}

# Cluster routes (ops multi-node — set STARSHIP_NATS_ROUTES in firstboot.env)
