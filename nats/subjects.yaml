# Starship OS NATS Subject Topology
# Dual-prefix: starship.* (primary) + agnetic.* (legacy Alpha 2.0)

prefixes:
  primary: starship
  legacy: agnetic

subjects:
  agent:
    proxy:
      command: "starship.agent.proxy.command.*"
      event: "starship.agent.proxy.event.*"
      status: "starship.agent.proxy.status"
      legacy:
        command: "agnetic.agent.proxy.command.*"
        event: "agnetic.agent.proxy.event.*"
        status: "agnetic.agent.proxy.status"
    romi:
      command: "starship.agent.romi.command.*"
      event: "starship.agent.romi.event.*"
      status: "starship.agent.romi.status"
      legacy:
        command: "agnetic.agent.romi.command.*"
        event: "agnetic.agent.romi.event.*"
        status: "agnetic.agent.romi.status"
    ergo:
      command: "starship.agent.ergo.command.*"
      event: "starship.agent.ergo.event.*"
      status: "starship.agent.ergo.status"
      legacy:
        command: "agnetic.agent.ergo.command.*"
        event: "agnetic.agent.ergo.event.*"
        status: "agnetic.agent.ergo.status"
  telemetry:
    root: "starship.telemetry"
    cpu: "starship.telemetry.cpu"
    mem: "starship.telemetry.mem"
    disk: "starship.telemetry.disk"
    net: "starship.telemetry.net"
    legacy:
      root: "agnetic.telemetry"
      cpu: "agnetic.telemetry.cpu"
      mem: "agnetic.telemetry.mem"
      disk: "agnetic.telemetry.disk"
      net: "agnetic.telemetry.net"
  workflow: "starship.workflow.>"
  skill: "starship.skill.>"

# Command types (used as wildcard *)
commands:
  - ping
  - status
  - report
  - configure
  - execute
  - stop

# Event types
events:
  - started
  - stopped
  - error
  - warning
  - completed
  - heartbeat
