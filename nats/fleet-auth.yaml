# Starship OS — multi-node NATS fleet auth map
# Used by fleet daemon + docs; secrets via env, never commit real tokens.

version: "2.1"
mode: token   # token | user_password | disabled (dev agent-bus.conf)

# Connection
url_env: NATS_URL
token_env: STARSHIP_NATS_TOKEN
default_url: "nats://127.0.0.1:4222"

# Dev token must match nats/fleet-bus.conf (replace in prod)
dev_token: "starship-fleet-dev-token"

# Subject permissions by fleet role (enforced in fleet_policy + optional NATS accounts)
roles:
  ops:
    publish:
      - "starship.fleet.>"
      - "starship.agent.>"
      - "starship.telemetry.>"
      - "agnetic.fleet.>"
      - "agnetic.agent.>"
      - "agnetic.telemetry.>"
    subscribe:
      - "starship.>"
      - "agnetic.>"
  plant-controller:
    publish:
      - "starship.fleet.heartbeat"
      - "starship.fleet.register"
      - "starship.fleet.status"
      - "agnetic.fleet.heartbeat"
      - "agnetic.fleet.register"
      - "agnetic.fleet.status"
    subscribe:
      - "starship.fleet.>"
      - "starship.fleet.ops.>"
      - "agnetic.fleet.>"
  red-team:
    # Range plant only — no fleet register outside plant-range
    publish:
      - "starship.agent.proxy.>"
      - "starship.fleet.heartbeat"
      - "agnetic.agent.proxy.>"
      - "agnetic.fleet.heartbeat"
    subscribe:
      - "starship.agent.proxy.>"
      - "starship.fleet.exercise"
      - "agnetic.agent.proxy.>"
      - "agnetic.fleet.exercise"
  blue-team:
    publish:
      - "starship.agent.>"
      - "starship.fleet.heartbeat"
      - "starship.fleet.status"
      - "agnetic.agent.>"
      - "agnetic.fleet.heartbeat"
      - "agnetic.fleet.status"
    subscribe:
      - "starship.>"
      - "agnetic.>"
  telemetry:
    publish:
      - "starship.telemetry.>"
      - "agnetic.telemetry.>"
    subscribe: []

# Heartbeat auth: fleet daemon requires token when fleet-bus is active
heartbeat:
  subject_primary: starship.fleet.heartbeat
  subject_legacy: agnetic.fleet.heartbeat
  require_token: true
  interval_seconds: 30

production:
  notes:
    - "Set STARSHIP_NATS_TOKEN from secret store / firstboot"
    - "Bind host 0.0.0.0 only on trusted fleet LAN or VPN"
    - "Prefer NATS accounts + nkeys over shared token for untrusted multi-tenant"
    - "Cluster routes use nats-route:// with TLS when available"
