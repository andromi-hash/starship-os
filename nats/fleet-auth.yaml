# Starship OS — multi-node NATS fleet auth map
# Secrets via env / nats/creds (gitignored); never commit real tokens.

version: "2.1"
# mode: disabled | token | accounts
#   disabled  — agent-bus.conf (dev)
#   token     — fleet-bus shared token (trusted LAN)
#   accounts  — multi-tenant accounts + optional nkeys (untrusted multi-tenant)
mode: accounts

url_env: NATS_URL
token_env: STARSHIP_NATS_TOKEN
user_env: NATS_USER
password_env: NATS_PASSWORD
nkey_seed_env: STARSHIP_NATS_NKEY_SEED
default_url: "nats://127.0.0.1:4222"

# Generate: bash scripts/gen-nats-accounts.sh --out /etc/starship/nats
accounts:
  SYS:
    role: sys
  STARSHIP_OPS:
    role: ops
    jetstream: true
    description: Full mesh — ops / plant-alpha
  STARSHIP_EDGE:
    role: edge
    jetstream: true
    description: Edge plant limited subjects
  STARSHIP_RANGE:
    roles: [red, blue]
    description: Isolated red/blue exercise plant
  STARSHIP_TELEM:
    role: telem
    description: Telemetry publish-only

# Subject permissions by fleet role (mirror of fleet-accounts.conf.tmpl)
roles:
  ops:
    account: STARSHIP_OPS
    publish: ["starship.>", "agnetic.>"]
    subscribe: ["starship.>", "agnetic.>"]
  plant-controller:
    account: STARSHIP_EDGE
    publish:
      - "starship.fleet.heartbeat"
      - "starship.fleet.register"
      - "starship.fleet.status"
      - "agnetic.fleet.heartbeat"
      - "agnetic.fleet.register"
      - "agnetic.fleet.status"
    subscribe:
      - "starship.fleet.>"
      - "starship.fleet.ops.>"
      - "agnetic.fleet.>"
  red-team:
    account: STARSHIP_RANGE
    publish:
      - "starship.agent.proxy.>"
      - "starship.fleet.heartbeat"
      - "agnetic.agent.proxy.>"
      - "agnetic.fleet.heartbeat"
    subscribe:
      - "starship.agent.proxy.>"
      - "starship.fleet.exercise"
      - "agnetic.agent.proxy.>"
      - "agnetic.fleet.exercise"
  blue-team:
    account: STARSHIP_RANGE
    publish:
      - "starship.agent.>"
      - "starship.fleet.heartbeat"
      - "starship.fleet.status"
      - "agnetic.agent.>"
      - "agnetic.fleet.heartbeat"
      - "agnetic.fleet.status"
    subscribe:
      - "starship.>"
      - "agnetic.>"
  telemetry:
    account: STARSHIP_TELEM
    publish:
      - "starship.telemetry.>"
      - "agnetic.telemetry.>"
    subscribe: []

heartbeat:
  subject_primary: starship.fleet.heartbeat
  subject_legacy: agnetic.fleet.heartbeat
  require_auth: true
  interval_seconds: 30

production:
  notes:
    - "Ops firstboot defaults to accounts mode (gen-nats-accounts.sh)"
    - "Creds live in /etc/starship/nats/creds/ (mode 600) — never commit"
    - "nkeys optional: go install github.com/nats-io/nkeys/nk@latest"
    - "Clients: source /etc/starship/nats.env or role env (ops/edge/red/blue/telem)"
    - "Python: agents/nats_connect.py (user/pass; nkey if nkeys package present)"
    - "Bind 0.0.0.0 only on trusted fleet LAN or VPN; prefer TLS for WAN"
