# Starship OS NATS Server Configuration
# Agent Communication Bus

port: 4222
host: "127.0.0.1"
http_port: 8222

jetstream {
  store_dir: "/tmp/starship-nats"
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Authorization disabled for development
